# cargo-deny configuration (v2 format)

[graph]
targets = []
all-features = true

[advisories]
version = 2
# Transitive deps of lancedb/fastembed — unmaintained but no security impact
ignore = [
    "RUSTSEC-2025-0119",
    "RUSTSEC-2024-0436",
]

[licenses]
version = 2
allow = [
    "MIT",
    "Apache-2.0",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "ISC",
    "MPL-2.0",
    "Unicode-3.0",
    "Unicode-DFS-2016",
    "Zlib",
    "CDLA-Permissive-2.0",
    "0BSD",
    "CC0-1.0",
    "BSL-1.0",
    "NCSA",
]
confidence-threshold = 0.8

[[licenses.exceptions]]
allow = ["LicenseRef-Convergio-Community"]
crate = "convergio-knowledge"

[[licenses.exceptions]]
allow = ["LicenseRef-Convergio-Community"]
crate = "convergio-types"

[[licenses.exceptions]]
allow = ["LicenseRef-Convergio-Community"]
crate = "convergio-telemetry"

[[licenses.exceptions]]
allow = ["LicenseRef-Convergio-Community"]
crate = "convergio-db"

[[licenses.exceptions]]
allow = ["LicenseRef-Convergio-Community"]
crate = "convergio-security"

[bans]
multiple-versions = "warn"
wildcards = "allow"

[sources]
unknown-registry = "deny"
unknown-git = "allow"
allow-git = [
    "https://github.com/Roberdan/convergio-sdk",
    "https://github.com/Roberdan/convergio-db",
]
